<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowFast — Payment Status</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .callback-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .callback-card { background: var(--surface); border: 1px solid var(--border); border-radius: 1rem; padding: 3rem 2.5rem; text-align: center; max-width: 480px; width: 100%; }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .callback-card h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .callback-card p { color: var(--muted); margin-bottom: 1.5rem; }
    .spinner { border: 3px solid var(--border); border-top: 3px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="callback-page">
    <div class="callback-card" id="card">
      <div class="spinner" id="spinner"></div>
      <h2>Verifying payment…</h2>
      <p>Please wait while we confirm your payment with Pesapal.</p>
    </div>
  </div>

  
  <script src="/app.js"></script>
  <script src="/callback.js"></script>
</body>
</html>
