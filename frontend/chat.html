<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowFast — AI Chat</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* ═══════════════════════════════════════════════════════════════
       CLAUDE-STYLE CHAT UI — FlowFast
       ═══════════════════════════════════════════════════════════════ */

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0; height: 100vh; overflow: hidden;
      display: flex; background: var(--bg);
      font-family: var(--font-sans, system-ui, sans-serif);
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    .sidebar {
      width: 260px; min-width: 260px; height: 100vh;
      background: var(--bg2, #161618); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      transition: width 0.2s, min-width 0.2s;
    }
    .sidebar.collapsed { width: 0; min-width: 0; border-right: none; }

    .sidebar-head {
      padding: 0.9rem 0.85rem 0.5rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .brand-mark {
      width: 22px; height: 22px; border-radius: 6px;
      background: var(--accent, #4f7cff);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .brand-mark svg { color: #fff; }
    .brand-name { font-size: 0.88rem; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }

    .new-chat-btn {
      margin: 0 0.75rem 0.4rem;
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.48rem 0.75rem; border-radius: 8px;
      background: rgba(79,124,255,0.1); border: 1px solid rgba(79,124,255,0.22);
      color: var(--accent, #4f7cff); font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s; width: calc(100% - 1.5rem);
    }
    .new-chat-btn:hover { background: rgba(79,124,255,0.18); border-color: rgba(79,124,255,0.4); }
    .new-chat-btn svg { flex-shrink: 0; }

    .sidebar-search-wrap {
      padding: 0 0.75rem 0.35rem; position: relative;
    }
    .sidebar-search-wrap svg {
      position: absolute; left: 1.2rem; top: 50%; transform: translateY(-50%);
      opacity: 0.4; pointer-events: none;
    }
    .sidebar-search-wrap input {
      width: 100%; padding: 0.38rem 0.75rem 0.38rem 2rem;
      background: var(--bg3, #1e1e21); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-size: 0.78rem; outline: none;
      transition: border-color 0.15s;
    }
    .sidebar-search-wrap input:focus { border-color: var(--accent, #4f7cff); }

    .chat-group-label {
      padding: 0.5rem 0.85rem 0.2rem;
      font-size: 0.65rem; font-weight: 600;
      color: var(--muted2, #555); letter-spacing: 0.08em; text-transform: uppercase;
    }

    .chat-list { flex: 1; overflow-y: auto; padding: 0 0.4rem 0.5rem; }
    .chat-list::-webkit-scrollbar { width: 3px; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .chat-row {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.42rem 0.55rem; border-radius: 7px; cursor: pointer;
      color: var(--muted, #888); font-size: 0.81rem;
      transition: all 0.1s; position: relative;
    }
    .chat-row:hover { background: var(--bg3, #1e1e21); color: var(--text); }
    .chat-row.active { background: var(--surface, #232327); color: var(--text); }
    .chat-row-icon { opacity: 0.4; flex-shrink: 0; }
    .chat-row.active .chat-row-icon { opacity: 0.65; }
    .chat-row-label {
      flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .chat-row-actions {
      display: none; gap: 0.1rem; flex-shrink: 0;
    }
    .chat-row:hover .chat-row-actions,
    .chat-row.active .chat-row-actions { display: flex; }
    .chat-row-btn {
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 0.18rem 0.25rem; border-radius: 4px; font-size: 0.72rem;
      line-height: 1; transition: all 0.1s;
    }
    .chat-row-btn:hover { background: var(--border); color: var(--text); }
    .chat-row-btn.del:hover { color: #f87171; }
    .chat-row-rename-input {
      flex: 1; background: var(--bg); border: 1px solid var(--accent);
      border-radius: 4px; color: var(--text); font-size: 0.8rem;
      padding: 0.08rem 0.3rem; outline: none;
    }

    .sidebar-footer {
      padding: 0.6rem 0.4rem; border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 0.1rem;
    }
    .sidebar-footer-link {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 0.55rem; border-radius: 7px;
      color: var(--muted); font-size: 0.8rem; text-decoration: none;
      background: none; border: none; cursor: pointer; width: 100%;
      transition: all 0.12s;
    }
    .sidebar-footer-link:hover { color: var(--text); background: var(--bg3); }

    /* ── Main area ───────────────────────────────────────────────── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      height: 100vh; overflow: hidden; position: relative;
      background: var(--bg, #111);
    }

    /* ── Topbar ──────────────────────────────────────────────────── */
    .topbar {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.6rem 1rem; border-bottom: 1px solid var(--border);
      background: var(--bg, #111); flex-shrink: 0; height: 52px;
    }
    .topbar-toggle {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0.35rem; border-radius: 6px;
      display: flex; align-items: center; transition: all 0.12s; flex-shrink: 0;
    }
    .topbar-toggle:hover { color: var(--text); background: var(--bg3); }
    .topbar-chat-name {
      flex: 1; font-size: 0.88rem; font-weight: 600; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .topbar-right { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }

    .model-pill {
      display: flex; align-items: center; gap: 0.3rem;
      background: var(--surface); border: 1px solid var(--border2, #333);
      border-radius: 999px; padding: 0.28rem 0.7rem 0.28rem 0.5rem;
      font-size: 0.74rem; color: var(--muted); cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .model-pill:hover { border-color: var(--accent); color: var(--text); }
    .model-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
    .model-pill select {
      background: none; border: none; outline: none;
      color: inherit; font-size: inherit; cursor: pointer; padding: 0;
    }

    .icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0.35rem; border-radius: 6px;
      display: flex; align-items: center; transition: all 0.12s;
    }
    .icon-btn:hover { color: var(--text); background: var(--bg3); }

    /* ── Plan banner ─────────────────────────────────────────────── */
    .plan-banner {
      display: none; padding: 0.35rem 1rem;
      background: rgba(79,124,255,0.06); border-bottom: 1px solid rgba(79,124,255,0.14);
      font-size: 0.74rem; color: var(--muted); text-align: center;
    }

    /* ── Messages ────────────────────────────────────────────────── */
    .messages {
      flex: 1; overflow-y: auto; padding: 1.5rem 0;
      display: flex; flex-direction: column; gap: 0;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Empty / welcome state */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 0.75rem;
      padding: 2rem; text-align: center;
    }
    .welcome-logo {
      width: 48px; height: 48px; border-radius: 14px;
      background: var(--accent, #4f7cff);
      display: flex; align-items: center; justify-content: center; margin-bottom: 0.25rem;
    }
    .welcome h2 { font-size: 1.25rem; font-weight: 700; color: var(--text); margin: 0; }
    .welcome p { font-size: 0.85rem; color: var(--muted); margin: 0; max-width: 380px; }
    .welcome-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-top: 0.35rem; }
    .welcome-chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.5rem 0.8rem;
      font-size: 0.79rem; color: var(--muted); cursor: pointer;
      transition: all 0.15s; text-align: left; max-width: 190px;
    }
    .welcome-chip:hover { border-color: var(--accent); color: var(--text); background: var(--bg3); }
    .welcome-chip strong { display: block; color: var(--text); font-weight: 600; font-size: 0.82rem; margin-bottom: 0.1rem; }

    /* Message rows */
    .msg-row {
      display: flex; padding: 0.5rem 1.25rem;
      gap: 0.75rem; align-items: flex-start;
      transition: background 0.1s;
    }
    .msg-row:hover { background: rgba(255,255,255,0.015); }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; margin-top: 2px;
    }
    .msg-avatar.ai {
      background: var(--accent, #4f7cff); color: #fff; border-radius: 8px;
    }
    .msg-avatar.human {
      background: var(--surface); border: 1px solid var(--border2, #333);
      color: var(--muted); font-size: 0.7rem;
    }

    .msg-body { flex: 1; min-width: 0; max-width: 760px; }
    .msg-row.user .msg-body { display: flex; flex-direction: column; align-items: flex-end; }

    .msg-name {
      font-size: 0.73rem; font-weight: 600; color: var(--muted);
      margin-bottom: 0.28rem; display: flex; align-items: center; gap: 0.4rem;
    }
    .msg-model-tag {
      font-size: 0.65rem; font-weight: 500;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 4px; padding: 0.05rem 0.3rem; color: var(--muted2);
    }

    .msg-files { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.4rem; }
    .file-chip {
      display: inline-flex; align-items: center; gap: 0.38rem;
      background: rgba(79,124,255,0.1); border: 1px solid rgba(79,124,255,0.22);
      border-radius: 8px; padding: 0.3rem 0.6rem; font-size: 0.78rem; color: var(--accent);
    }
    .file-chip .fc-size { font-size: 0.68rem; color: var(--muted); }

    .msg-bubble {
      padding: 0.7rem 0.95rem; border-radius: 14px;
      font-size: 0.875rem; line-height: 1.7;
      max-width: 100%; word-break: break-word;
    }
    .msg-row.user .msg-bubble {
      background: var(--accent, #4f7cff); color: #fff; border-radius: 14px 14px 4px 14px;
    }
    .msg-row.assistant .msg-bubble {
      background: var(--surface, #232327); border: 1px solid var(--border);
      border-radius: 4px 14px 14px 14px; color: var(--text);
    }

    /* Markdown in AI bubble */
    .msg-bubble p { margin: 0 0 0.55em; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 1.4em; margin: 0.4em 0; }
    .msg-bubble li { margin-bottom: 0.2em; }
    .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { font-size: 1em; font-weight: 700; margin: 0.7em 0 0.3em; }
    .msg-bubble code {
      background: rgba(0,0,0,0.25); padding: 0.1em 0.38em; border-radius: 4px;
      font-family: var(--mono, monospace); font-size: 0.83em;
    }
    .msg-bubble pre {
      background: rgba(0,0,0,0.3); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.75rem 1rem; overflow-x: auto; margin: 0.5em 0;
      position: relative;
    }
    .msg-bubble pre code { background: none; padding: 0; }
    .msg-row.user .msg-bubble code { background: rgba(0,0,0,0.2); }
    .msg-bubble table { border-collapse: collapse; width: 100%; font-size: 0.82rem; margin: 0.5em 0; }
    .msg-bubble th,.msg-bubble td { border: 1px solid var(--border); padding: 0.32rem 0.55rem; text-align: left; }
    .msg-bubble th { background: var(--bg3); font-weight: 600; }
    .msg-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 0.75rem; color: var(--muted); margin: 0.4em 0; }

    .pre-copy-btn {
      position: absolute; top: 0.4rem; right: 0.4rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 5px; color: var(--muted); font-size: 0.68rem;
      padding: 0.12rem 0.45rem; cursor: pointer; transition: all 0.12s;
    }
    .pre-copy-btn:hover { color: var(--text); border-color: var(--border2); }

    /* Message actions */
    .msg-actions {
      display: none; gap: 0.2rem; margin-top: 0.3rem; align-items: center;
    }
    .msg-row:hover .msg-actions { display: flex; }
    .msg-act-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted); font-size: 0.7rem;
      padding: 0.18rem 0.45rem; cursor: pointer; transition: all 0.12s;
      display: flex; align-items: center; gap: 0.22rem;
    }
    .msg-act-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface); }

    /* Thinking dots */
    .thinking {
      display: flex; align-items: center; gap: 0.45rem;
      font-size: 0.78rem; color: var(--muted); padding: 0.2rem 0;
    }
    .thinking-dots { display: flex; gap: 3px; }
    .thinking-dots span {
      width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
      animation: tdot 1.2s ease-in-out infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot { 0%,60%,100% { opacity: 0.25; transform: scale(0.85); } 30% { opacity: 1; transform: scale(1); } }

    /* Scroll to bottom */
    #scrollToBottom {
      position: absolute; bottom: 6rem; right: 1.25rem;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 50%; width: 34px; height: 34px;
      display: none; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35); z-index: 5;
    }
    #scrollToBottom:hover { color: var(--text); border-color: var(--accent); }
    #scrollToBottom.show { display: flex; }

    /* ── Input area ──────────────────────────────────────────────── */
    .input-area {
      padding: 0.75rem 1.25rem 1rem; flex-shrink: 0;
      background: var(--bg, #111);
    }

    .attach-bar {
      display: none; flex-wrap: wrap; gap: 0.38rem; margin-bottom: 0.5rem;
    }
    .attach-bar.show { display: flex; }
    .att-chip {
      display: inline-flex; align-items: center; gap: 0.32rem;
      background: rgba(79,124,255,0.1); border: 1px solid rgba(79,124,255,0.28);
      border-radius: 8px; padding: 0.28rem 0.5rem; font-size: 0.77rem; color: var(--accent);
      max-width: 200px;
    }
    .att-chip .ac-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .att-chip .ac-size { font-size: 0.66rem; color: var(--muted); flex-shrink: 0; }
    .att-chip button {
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 0; line-height: 1; font-size: 1rem;
    }
    .att-chip button:hover { color: #f87171; }

    .input-box {
      background: var(--surface, #232327); border: 1px solid var(--border2, #333);
      border-radius: 14px; transition: border-color 0.15s, box-shadow 0.15s; overflow: hidden;
    }
    .input-box:focus-within {
      border-color: var(--accent, #4f7cff); box-shadow: 0 0 0 3px rgba(79,124,255,0.12);
    }
    .input-inner {
      display: flex; align-items: flex-end; gap: 0.2rem;
      padding: 0.55rem 0.5rem 0.55rem 0.85rem;
    }
    .input-inner textarea {
      flex: 1; background: transparent; border: none; outline: none;
      resize: none; color: var(--text); font-size: 0.875rem;
      padding: 0.25rem 0; min-height: 24px; max-height: 180px;
      line-height: 1.55; font-family: inherit;
    }
    .input-inner textarea::placeholder { color: var(--muted2, #555); }
    .input-tools { display: flex; align-items: center; gap: 0.1rem; flex-shrink: 0; }
    .inp-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0.38rem; border-radius: 7px;
      display: flex; align-items: center; transition: all 0.12s;
    }
    .inp-btn:hover { color: var(--accent); background: rgba(79,124,255,0.1); }
    .inp-btn.active { color: var(--accent); }
    .send-btn {
      background: var(--accent, #4f7cff); border: none; cursor: pointer;
      color: #fff; padding: 0.42rem 0.52rem; border-radius: 9px;
      display: flex; align-items: center; transition: all 0.15s; flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { filter: brightness(1.1); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }

    .input-hint {
      font-size: 0.67rem; color: var(--muted2, #555); text-align: center;
      padding: 0.3rem 0.75rem 0; border-top: 1px solid var(--border);
    }

    /* ── Mobile ──────────────────────────────────────────────────── */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 49;
    }
    .sidebar-overlay.show { display: block; }
    @media (max-width: 720px) {
      .sidebar {
        position: fixed; top: 0; left: -270px; z-index: 50;
        height: 100vh; width: 260px !important; min-width: 260px !important;
        box-shadow: 4px 0 24px rgba(0,0,0,0.5); transition: left 0.22s;
      }
      .sidebar.mobile-open { left: 0; }
      .sidebar.collapsed { left: -270px; }
    }

    /* ── File type colours ───────────────────────────────────────── */
    .ft-pdf { color: #ef4444; } .ft-img { color: #f59e0b; }
    .ft-csv,.ft-xlsx { color: #22c55e; } .ft-json { color: #a78bfa; }
    .ft-xml { color: #fb923c; } .ft-doc { color: #3b82f6; }
    .ft-default { color: var(--muted); }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ── SIDEBAR ─────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="brand-mark">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <span class="brand-name">FlowFast</span>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New chat
    </button>

    <div class="sidebar-search-wrap">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="chatSearch" placeholder="Search chats…" autocomplete="off" />
    </div>

    <div class="chat-group-label">Recent</div>
    <div class="chat-list" id="chatList"></div>

    <div class="sidebar-footer">
      <a href="/dashboard" class="sidebar-footer-link">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Analyst Dashboard
      </a>
      <button class="sidebar-footer-link" id="logoutBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- ── MAIN ────────────────────────────────────────────────────── -->
  <div class="main" id="mainArea">

    <!-- Topbar -->
    <div class="topbar">
      <button class="topbar-toggle" id="sidebarToggle" title="Toggle sidebar">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

      <div class="topbar-chat-name" id="chatTitle">Select or start a chat</div>

      <div class="topbar-right">
        <div class="model-pill">
          <div class="model-dot" id="modelDot"></div>
          <select id="modelSelect" title="AI model">
            <option value="gemini">Gemini Flash</option>
            <option value="claude">Claude Haiku</option>
          </select>
        </div>
        <button class="icon-btn" id="themeToggle" title="Toggle theme">&#9680;</button>
      </div>
    </div>

    <!-- Plan banner -->
    <div id="planBanner" class="plan-banner"></div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="welcome" id="emptyState">
        <div class="welcome-logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <h2>FlowFast AI</h2>
        <p>Ask anything about your uploaded documents. Files are scoped to this chat only.</p>
        <div class="welcome-chips">
          <button class="welcome-chip" data-prompt="Summarize all my uploaded documents">
            <strong>Summarize docs</strong>Overview of uploaded files
          </button>
          <button class="welcome-chip" data-prompt="What invoices do I have and what are the totals?">
            <strong>Invoice totals</strong>List all invoices
          </button>
          <button class="welcome-chip" data-prompt="What is my total revenue from these documents?">
            <strong>Revenue check</strong>Calculate total revenue
          </button>
          <button class="welcome-chip" data-prompt="Who are my customers and vendors?">
            <strong>Contacts</strong>Extract names &amp; vendors
          </button>
        </div>
      </div>
    </div>

    <!-- Scroll to bottom -->
    <button id="scrollToBottom" title="Scroll to bottom">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </button>

    <!-- Input area -->
    <div class="input-area">
      <div class="attach-bar" id="attachBar"></div>

      <div class="input-box">
        <input type="file" id="chatFileInput" style="display:none" multiple
          accept=".pdf,.png,.jpg,.jpeg,.gif,.webp,.csv,.xlsx,.xls,.json,.xml,.txt,.doc,.docx,.zip" />

        <div class="input-inner">
          <textarea id="chatInput" placeholder="Message FlowFast AI…" rows="1"></textarea>
          <div class="input-tools">
            <button class="inp-btn" id="attachBtn" title="Attach files">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.64 17.23a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <button class="send-btn" id="sendBtn" title="Send (Enter)" disabled>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
        <div class="input-hint">
          FlowFast AI reads only files attached in this chat · PDF, images, CSV, Excel, JSON, XML &amp; more
        </div>
      </div>
    </div>
  </div>

  <script src="/scripts.js"></script>
</body>
</html>
