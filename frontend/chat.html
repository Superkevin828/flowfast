<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowFast — AI Chat</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* ── File attach chip ── */
    .attach-chip {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(79,124,255,0.12); border: 1px solid rgba(79,124,255,0.3);
      border-radius: 8px; padding: 0.3rem 0.6rem; font-size: 0.78rem;
      color: var(--accent); margin-bottom: 0.5rem; max-width: 100%;
    }
    .attach-chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
    .attach-chip button {
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 0; line-height: 1; font-size: 1rem; flex-shrink: 0;
    }
    .attach-chip button:hover { color: var(--red); }

    /* ── Attach button ── */
    .attach-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0.5rem; border-radius: 8px;
      display: flex; align-items: center; transition: all 0.15s;
      flex-shrink: 0;
    }
    .attach-btn:hover { color: var(--accent); background: rgba(79,124,255,0.1); }
    .attach-btn.has-file { color: var(--accent); }

    /* ── Input row with attach ── */
    .chat-input-inner {
      display: flex; align-items: flex-end; gap: 0.5rem;
    }
    .chat-input-wrap { flex: 1; }

    /* ── File message bubble ── */
    .msg-file-chip {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(79,124,255,0.1); border: 1px solid rgba(79,124,255,0.2);
      border-radius: 8px; padding: 0.35rem 0.65rem; font-size: 0.8rem;
      color: var(--accent); margin-bottom: 0.35rem;
    }
  </style>
</head>
<body>
  <div class="chat-layout">
    <!-- SIDEBAR -->
    <aside class="chat-sidebar">
      <a href="/" class="brand" style="padding:0.25rem 0.5rem 1rem;display:flex;align-items:center;gap:0.5rem;">
        <span class="dot" style="width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;"></span>FlowFast
      </a>
      <button class="btn primary full" id="newChatBtn" style="margin-bottom:0.75rem;border-radius:var(--radius);font-size:0.82rem;">+ New chat</button>
      <div style="font-size:0.68rem;font-weight:600;color:var(--muted2);letter-spacing:0.08em;text-transform:uppercase;padding:0 0.5rem 0.5rem;">Recent chats</div>
      <div id="chatList" style="flex:1;display:flex;flex-direction:column;gap:0.2rem;overflow-y:auto;"></div>
      <div style="margin-top:auto;padding-top:0.75rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:0.25rem;">
        <a href="/dashboard" style="display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0.75rem;border-radius:var(--radius);color:var(--muted);font-size:0.82rem;transition:all 0.15s;" onmouseover="this.style.color='var(--text)';this.style.background='var(--surface)'" onmouseout="this.style.color='var(--muted)';this.style.background='transparent'">&#8592; Analyst</a>
      </div>
    </aside>

    <!-- CHAT MAIN -->
    <div class="chat-main">
      <div class="chat-topbar">
        <div>
          <div id="chatTitle" style="font-weight:600;font-size:0.9rem;">Select or start a chat</div>
          <div id="chatMeta" style="font-size:0.75rem;color:var(--muted);margin-top:0.1rem;">Attach documents or ask questions</div>
        </div>
        <div style="display:flex;align-items:center;gap:0.5rem;">
          <button class="theme-btn" id="themeToggle">&#9680;</button>
        </div>
      </div>

      <!-- PLAN BANNER -->
      <div id="planBanner" class="plan-banner"></div>

      <!-- MESSAGES -->
      <div class="messages-area" id="messages">
        <div class="empty-state" id="emptyState">
          <div class="es-icon">&#129302;</div>
          <h3>FlowFast AI</h3>
          <p>Start a new chat. Attach documents with the 📎 button or ask anything.</p>
          <div style="display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;margin-top:0.5rem;">
            <button class="btn text-sm" onclick="insertPrompt('Summarize my documents')">Summarize my documents</button>
            <button class="btn text-sm" onclick="insertPrompt('What invoices do I have?')">What invoices do I have?</button>
            <button class="btn text-sm" onclick="insertPrompt('Show me all totals')">Show me all totals</button>
          </div>
        </div>
      </div>

      <!-- INPUT BAR -->
      <div class="chat-input-bar">
        <!-- Attached file chip (shown when file selected) -->
        <div id="attachChipWrap" style="display:none;padding:0 0.25rem 0.25rem;">
          <div class="attach-chip">
            <span>📎</span>
            <span id="attachChipName"></span>
            <button onclick="clearAttach()" title="Remove file">×</button>
          </div>
        </div>

        <div class="chat-input-inner">
          <!-- Hidden file input -->
          <input type="file" id="chatFileInput" style="display:none"
            accept=".pdf,.png,.jpg,.jpeg,.csv,.xlsx,.xls,.json,.xml,.txt" />

          <!-- Attach button -->
          <button class="attach-btn" id="attachBtn" title="Attach a document" onclick="document.getElementById('chatFileInput').click()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.64 17.23a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>

          <div class="chat-input-wrap">
            <textarea id="chatInput" placeholder="Ask about your documents… or attach a file with 📎" rows="1"></textarea>
          </div>

          <button class="send-btn" id="sendBtn" title="Send message">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>

        <div style="text-align:center;margin-top:0.4rem;" id="chatFooterLabel">
          <span class="text-xs muted">FlowFast AI · Attach PDF, CSV, images &amp; more</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
  <script src="/chat.js"></script>
</body>
</html>
